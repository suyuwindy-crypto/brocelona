<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>STARLEAGUE DAILY QUIZ</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Russo+One&family=Orbitron:wght@600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --green:#39ff14; --green-dim:#1a7a00; --green-glow:rgba(57,255,20,0.25);
  --yellow:#ffd700; --yellow-glow:rgba(255,215,0,0.3);
  --red:rgba(180,20,20,0.85); --red-glow:rgba(220,40,40,0.4);
  --text:#39ff14; --text-dim:#1a7a00; --bg:#000;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100vw;min-height:100vh;background:var(--bg);font-family:'Rajdhani',sans-serif;color:var(--green);}
.bg{position:fixed;inset:0;z-index:0;background:
  radial-gradient(ellipse 100% 60% at 20% 70%,#0a0a1a,transparent),
  radial-gradient(ellipse 80% 50% at 80% 20%,#150500,transparent),#030308;}
.bg::before{content:'';position:absolute;inset:0;background-image:
  radial-gradient(1px 1px at 8% 12%,rgba(255,255,255,0.7),transparent),
  radial-gradient(1px 1px at 22% 28%,rgba(255,255,255,0.5),transparent),
  radial-gradient(1px 1px at 38% 6%,rgba(255,255,255,0.6),transparent),
  radial-gradient(1px 1px at 55% 18%,rgba(255,255,255,0.4),transparent),
  radial-gradient(1px 1px at 72% 10%,rgba(255,255,255,0.7),transparent),
  radial-gradient(1px 1px at 88% 32%,rgba(255,255,255,0.5),transparent),
  radial-gradient(1px 1px at 14% 52%,rgba(255,255,255,0.3),transparent),
  radial-gradient(1px 1px at 92% 48%,rgba(255,255,255,0.4),transparent),
  radial-gradient(2px 2px at 45% 75%,rgba(255,255,255,0.3),transparent),
  radial-gradient(1px 1px at 30% 90%,rgba(255,255,255,0.2),transparent);}

.app{position:relative;z-index:1;width:100vw;max-width:520px;margin:0 auto;min-height:100vh;
  display:flex;flex-direction:column;padding:7px 7px 50px;gap:8px;}

/* SC1 패널 */
.sc-panel{background:rgba(0,0,0,0.4);border:1.5px solid var(--red);
  box-shadow:0 0 6px rgba(180,20,20,0.2),inset 0 0 16px rgba(0,0,0,0.15);
  position:relative;backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);}
.sc-panel::before,.sc-panel::after{content:'';position:absolute;width:10px;height:10px;
  border:1px solid rgba(255,215,0,0.7);z-index:3;box-shadow:0 0 5px rgba(255,215,0,0.4);}
.sc-panel::before{top:-1px;left:-1px;border-right:none;border-bottom:none;}
.sc-panel::after{bottom:-1px;right:-1px;border-left:none;border-top:none;}
.sc-panel .c-tr,.sc-panel .c-bl{position:absolute;width:12px;height:12px;
  border:1px solid rgba(255,215,0,0.7);z-index:3;box-shadow:0 0 5px rgba(255,215,0,0.3);}
.sc-panel .c-tr{top:-1px;right:-1px;border-left:none;border-bottom:none;}
.sc-panel .c-bl{bottom:-1px;left:-1px;border-right:none;border-top:none;}

/* 헤더 */
.header{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;}
.hdr-left{display:flex;align-items:center;gap:9px;}
.hdr-blink{width:8px;height:8px;border-radius:50%;background:var(--green);
  box-shadow:0 0 10px var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.hdr-title{font-family:'Russo One',sans-serif;font-size:17px;letter-spacing:3px;color:var(--yellow);text-shadow:0 0 10px var(--yellow-glow);}
.hdr-sub{font-size:9px;color:var(--text-dim);letter-spacing:2px;font-family:'Orbitron',sans-serif;margin-top:1px;}
.hdr-date{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--green);text-shadow:0 0 8px var(--green-glow);text-align:right;}
.hdr-date small{display:block;font-size:7px;color:var(--text-dim);letter-spacing:1px;}

/* 섹션 라벨 */
.sec-lbl{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:3px;
  color:var(--green);padding:7px 12px;background:rgba(0,0,0,0.6);
  border:1px solid rgba(180,20,20,0.35);border-left:2px solid rgba(57,255,20,0.6);
  display:flex;align-items:center;justify-content:space-between;}
.sec-lbl .cnt{color:var(--yellow);font-size:9px;}

/* 참가자 선택 */
.who{padding:11px 13px;display:flex;align-items:center;gap:9px;}
.who-lbl{font-family:'Orbitron',sans-serif;font-size:9px;color:var(--yellow);letter-spacing:2px;white-space:nowrap;}
.who-sel{flex:1;padding:9px 10px;background:rgba(0,10,0,0.7);border:1px solid rgba(57,255,20,0.3);
  color:var(--green);font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:1px;outline:none;}
.who-sel option{background:#001500;color:#39ff14;}

/* 미니 통계 */
.mystat{display:flex;gap:6px;}
.ms-box{flex:1;padding:9px 6px;text-align:center;background:rgba(0,5,0,0.5);
  border:1px solid rgba(180,20,20,0.25);}
.ms-num{font-family:'Russo One',sans-serif;font-size:20px;color:var(--green);text-shadow:0 0 6px var(--green-glow);line-height:1;}
.ms-lbl{font-size:8px;color:var(--text-dim);font-family:'Orbitron',sans-serif;letter-spacing:1px;margin-top:4px;}

/* 문제 카드 */
/* 문제 카드 — 콘솔 안에 끼워진 밝은 리드아웃 패널 (가독성 우선) */
#today-list{padding:7px;}
.qcard{padding:14px 13px;background:#eaeee4;border:1px solid #b3c0a6;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.7), 0 0 0 1px rgba(0,0,0,0.25), 0 2px 6px rgba(0,0,0,0.4);}
.qcard + .qcard{margin-top:8px;}
.qc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.qc-sector{font-family:'Orbitron',sans-serif;font-size:8px;font-weight:700;letter-spacing:2px;
  color:var(--yellow);padding:3px 9px;border-radius:2px;background:#243018;}
.qc-type{font-family:'Share Tech Mono',monospace;font-size:9px;color:#6a7b5c;letter-spacing:1px;}
.qc-q{font-size:16px;font-weight:600;color:#15240d;line-height:1.5;margin-bottom:13px;word-break:keep-all;}

.qc-opts{display:flex;flex-direction:column;gap:6px;}
.qc-opts.ox{flex-direction:row;gap:8px;}
.opt{padding:12px;background:#f6f8f2;border:1px solid #c4d1ba;
  color:#1b2a14;font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:600;
  cursor:pointer;transition:all 0.12s;text-align:left;display:flex;align-items:center;gap:9px;}
.qc-opts.ox .opt{flex:1;justify-content:center;font-family:'Russo One',sans-serif;font-size:21px;padding:15px;}
.opt:active{transform:scale(0.98);}
.opt:not(.locked):hover{border-color:#7fae6a;background:#e6f0de;}
.opt .opt-key{font-family:'Orbitron',sans-serif;font-size:12px;color:#7a8a6c;flex-shrink:0;}
.qc-opts.ox .opt .opt-key{display:none;}
.opt.locked{cursor:default;}
.opt.correct{border:1.5px solid #3a9e1e;background:#d4efc9;color:#123e07;box-shadow:0 0 8px rgba(58,158,30,0.35);}
.opt.wrong{border:1.5px solid #c63b3b;background:#f4d9d9;color:#7c1616;}
.opt.dim{opacity:0.45;}

.qc-result{margin-top:12px;padding:10px 12px;border-left:3px solid;background:#f0f3eb;font-size:13.5px;line-height:1.55;display:none;}
.qc-result.show{display:block;}
.qc-result.ok{border-color:#3a9e1e;}
.qc-result.no{border-color:#c63b3b;}
.qc-verdict{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;margin-bottom:5px;}
.qc-verdict.ok{color:#1c7a0a;}
.qc-verdict.no{color:#b02020;}
.qc-explain{color:#32402a;}
.qc-src{font-family:'Share Tech Mono',monospace;font-size:9px;color:#6f7f62;margin-top:6px;}

/* 리더보드 */
.lb-row{display:grid;grid-template-columns:30px 1fr 54px 48px;align-items:center;gap:8px;
  padding:9px 12px;border-bottom:1px solid rgba(57,255,20,0.06);background:rgba(0,5,0,0.4);}
.lb-row.head{background:rgba(0,0,0,0.6);border-bottom:1px solid rgba(255,215,0,0.2);}
.lb-row.head>div{font-family:'Orbitron',sans-serif;font-size:8px;color:var(--text-dim);letter-spacing:1px;}
.lb-rank{font-family:'Russo One',sans-serif;font-size:14px;color:var(--text-dim);text-align:center;}
.lb-rank.top{color:var(--yellow);text-shadow:0 0 8px var(--yellow-glow);}
.lb-name{font-size:14px;font-weight:700;color:var(--green);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lb-name .me{font-size:8px;color:var(--yellow);margin-left:5px;font-family:'Orbitron',sans-serif;}
.lb-correct{font-family:'Russo One',sans-serif;font-size:15px;color:var(--green);text-align:right;}
.team-score{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:9px;}
.ts-card{background:rgba(0,0,0,0.6);border:1px solid var(--green-dim);border-radius:3px;padding:10px 4px;text-align:center;position:relative;transition:.2s;}
.ts-name{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:2px;color:var(--green);opacity:.8;}
.ts-pts{font-family:'Russo One',sans-serif;font-size:22px;color:var(--green);text-shadow:0 0 6px var(--green-glow);line-height:1.1;margin-top:4px;}
.ts-card.lead{border-color:var(--yellow);box-shadow:0 0 12px var(--yellow-glow);background:#1a1500;}
.ts-card.lead .ts-name{color:var(--yellow);opacity:1;}
.ts-card.lead .ts-pts{color:var(--yellow);text-shadow:0 0 10px var(--yellow-glow);}
.ts-card.lead::before{content:'★';position:absolute;top:-9px;left:50%;transform:translateX(-50%);font-size:12px;color:var(--yellow);text-shadow:0 0 8px var(--yellow-glow);}
.lb-rate{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text-dim);text-align:right;}
.lb-row.me-row{background:rgba(255,215,0,0.06);}

/* 주차 블록 */
.week-block{display:flex;flex-direction:column;gap:8px;}
.week-block + .week-block{margin-top:18px;padding-top:15px;border-top:1px dashed rgba(57,255,20,0.18);}
.week-hdr .wk-range{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text-dim);letter-spacing:1px;margin-left:7px;}
.wk-badge.live{color:var(--yellow);}
.wk-badge.done{color:var(--text-dim);}
.week-block .team-score{margin-bottom:0;}

.empty{padding:22px;text-align:center;color:var(--text-dim);font-size:11px;letter-spacing:1px;font-family:'Orbitron',sans-serif;}
.toast{position:fixed;left:50%;bottom:64px;transform:translateX(-50%);z-index:99;
  background:rgba(0,0,0,0.9);border:1px solid rgba(255,215,0,0.5);color:var(--yellow);
  font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:1px;padding:9px 16px;
  opacity:0;transition:opacity 0.25s;pointer-events:none;}
.toast.show{opacity:1;}

/* 네비 */
.nav{position:fixed;left:0;right:0;bottom:0;z-index:5;max-width:520px;margin:0 auto;
  display:flex;height:44px;border-top:1px solid rgba(180,20,20,0.25);background:rgba(0,0,0,0.92);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  font-size:7px;letter-spacing:1px;color:var(--text-dim);cursor:pointer;
  border-right:1px solid rgba(180,20,20,0.25);font-family:'Orbitron',sans-serif;}
.nav-btn:last-child{border-right:none;}
.nav-btn .ni{font-size:15px;}
.nav-btn .ni img{width:19px;height:19px;object-fit:contain;mix-blend-mode:screen;}
.nav-btn.active{color:var(--yellow);text-shadow:0 0 6px var(--yellow-glow);}
</style>
</head>
<body>
<div class="bg"></div>
<div class="app">

  <div class="header sc-panel">
    <div class="c-tr"></div><div class="c-bl"></div>
    <div class="hdr-left">
      <div class="hdr-blink"></div>
      <div>
        <div class="hdr-title">DAILY QUIZ</div>
        <div class="hdr-sub">RULE TRAINING · 오늘의 2문제</div>
      </div>
    </div>
    <div class="hdr-date" id="hdr-date">––––<small>LOADING</small></div>
  </div>

  <div class="who sc-panel">
    <div class="c-tr"></div><div class="c-bl"></div>
    <div class="who-lbl">⬡ 참가자</div>
    <select class="who-sel" id="who-sel">
      <option value="">— 이름을 선택하세요 —</option>
    </select>
  </div>

  <div class="sec-lbl">⬡ 내 점수</div>
  <div class="mystat">
    <div class="ms-box"><div class="ms-num" id="ms-total" style="color:var(--yellow);text-shadow:0 0 8px var(--yellow-glow)">–</div><div class="ms-lbl">누적 총점</div></div>
    <div class="ms-box"><div class="ms-num" id="ms-correct">–</div><div class="ms-lbl">오늘 맞힘</div></div>
    <div class="ms-box"><div class="ms-num" id="ms-prov">–</div><div class="ms-lbl">오늘 점수</div></div>
  </div>
  <div id="ms-note" style="font-size:9px;color:var(--text-dim);font-family:'Orbitron',sans-serif;letter-spacing:1px;padding:5px 2px 0;line-height:1.5;">오늘 점수는 출석·정답 잠정치 · 속도/팀 보너스는 자정에 확정</div>

  <div class="sec-lbl">⬡ 오늘의 문제 <span class="cnt" id="today-cnt"></span></div>
  <div id="today-wrap" class="sc-panel" style="padding:0;">
    <div class="c-tr"></div><div class="c-bl"></div>
    <div id="today-list"><div class="empty">문제 불러오는 중…</div></div>
  </div>

  <div class="sec-lbl">⬡ 주차별 순위 <span class="cnt">최신 주차 ▲</span></div>
  <div id="weeks-wrap"><div class="empty">집계 대기 중…</div></div>

</div>

<div class="nav">
  <div class="nav-btn" onclick="go('brocelona.html')"><div class="ni"><img src="https://suyuwindy-crypto.github.io/brocelona/mineral.webp"></div><div>MINERAL</div></div>
  <div class="nav-btn" onclick="go('team_select.html')"><div class="ni"><img src="https://suyuwindy-crypto.github.io/brocelona/populationt.webp"></div><div>TEAM</div></div>
  <div class="nav-btn" onclick="go('lightwar_main.html')"><div class="ni">⚽</div><div>BOARD</div></div>
  <div class="nav-btn active"><div class="ni">❓</div><div>QUIZ</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbzh4fFD9JafD2hX7ffutEumOGMg8jKojxP3wfpXjT3LmR_ctbN8-AuBmBgWVRa77ke-/exec';
  const NAME_KEY = 'broceQuizName';
  const SEASON_START = '2026-06-29';   // 시즌 시작(월) — 주차 날짜 범위 표시용
  let myName = '';
  let todayQuestions = [];
  let todayDate = '';

  function go(p){ window.location.href = p; }
  function api(params){
    const qs = Object.keys(params).map(k=>k+'='+encodeURIComponent(params[k])).join('&');
    return fetch(API_URL+'?'+qs, {method:'GET', redirect:'follow'}).then(r=>r.text()).then(t=>JSON.parse(t));
  }
  function toast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(t._tm); t._tm = setTimeout(()=>t.classList.remove('show'), 1800);
  }

  // ── 참가자 명단 (기존 본리그 로스터에서 가져옴) ──
  async function loadNames(){
    const sel = document.getElementById('who-sel');
    try{
      const data = await api({action:'mainleague'});
      const names = [];
      if(data.roster){
        ['protoss','zerg','terran'].forEach(race=>{
          (data.roster[race]||[]).forEach(m=>{ if(m && m.name) names.push(m.name); });
        });
      }
      names.sort((a,b)=>a.localeCompare(b,'ko'));
      names.forEach(n=>{
        const o = document.createElement('option'); o.value=n; o.textContent=n; sel.appendChild(o);
      });
    }catch(e){ console.error('names load fail', e); }

    const saved = localStorage.getItem(NAME_KEY) || '';
    if(saved){ sel.value = saved; myName = saved; }
    sel.addEventListener('change', ()=>{
      myName = sel.value;
      localStorage.setItem(NAME_KEY, myName);
      loadToday();
      refreshMine();
      loadBoard();
    });
  }

  // ── 오늘의 문제 (이름 선택 시 2문제 배정) ──
  async function loadToday(){
    const wrap = document.getElementById('today-list');
    if(!myName){
      wrap.innerHTML = '<div class="empty">참가자 이름을 선택하면<br>오늘의 2문제가 배정됩니다.</div>';
      document.getElementById('today-cnt').textContent = '';
      return;
    }
    wrap.innerHTML = '<div class="empty">문제 배정 중…</div>';
    try{
      const data = await api({action:'quizToday', name:myName});
      todayDate = data.date || '';
      todayQuestions = data.questions || [];
      renderDate();
      if(data.closed){
        wrap.innerHTML = '<div class="empty">오늘은 퀴즈가 쉬는 날입니다.<br>퀴즈는 평일(월~금)에만 출제됩니다.</div>';
        document.getElementById('today-cnt').textContent = '휴무';
        return;
      }
      renderQuestions();
      document.getElementById('today-cnt').textContent = todayQuestions.length ? todayQuestions.length+'문제' : '';
    }catch(e){
      wrap.innerHTML = '<div class="empty">문제를 불러오지 못했습니다.<br>시트·GAS 설정을 확인해 주세요.</div>';
    }
  }

  function renderDate(){
    const el = document.getElementById('hdr-date');
    if(!todayDate){ el.innerHTML='––––<small>NO DATE</small>'; return; }
    const [y,m,d] = todayDate.split('-');
    el.innerHTML = m+'.'+d+'<small>'+y+'</small>';
  }

  function renderQuestions(myMap){
    const wrap = document.getElementById('today-list');
    if(!todayQuestions.length){
      wrap.innerHTML = '<div class="empty">출제 가능한 문제가 없습니다.<br><b>퀴즈문제</b> 시트에 문제를 추가해 주세요.</div>';
      return;
    }
    wrap.innerHTML = '';
    todayQuestions.forEach((q,i)=>{
      const card = document.createElement('div');
      card.className = 'qcard';
      const answered = myMap && myMap[q.id];

      let optsHtml = '';
      if(q.type === 'OX'){
        optsHtml = '<div class="qc-opts ox">'+
          optBtn(q,'O','O')+optBtn(q,'X','X')+'</div>';
      } else {
        const keys = ['①','②','③','④'];
        optsHtml = '<div class="qc-opts">'+
          q.choices.map((c,idx)=> c!=='' && c!=null ?
            optBtn(q, String(idx+1), c, keys[idx]) : '').join('')+'</div>';
      }

      card.innerHTML =
        '<div class="qc-top">'+
          '<span class="qc-sector">'+(q.sector||'')+'</span>'+
          '<span class="qc-type">'+(q.type==='OX'?'O / X':'4지선다')+'</span>'+
        '</div>'+
        '<div class="qc-q">Q'+(i+1)+'. '+q.q+'</div>'+
        optsHtml+
        '<div class="qc-result" id="res-'+q.id+'"></div>';
      wrap.appendChild(card);

      if(answered){ lockCard(q, answered.answer, answered.correct, null, null, true); }
    });
  }

  function optBtn(q, val, label, key){
    const k = key ? '<span class="opt-key">'+key+'</span>' : '';
    return '<button class="opt" data-q="'+q.id+'" data-val="'+val+'" onclick="answer(\''+q.id+'\',\''+val+'\')">'+
             k+'<span>'+label+'</span></button>';
  }

  // ── 답안 제출 ──
  async function answer(id, val){
    if(!myName){ toast('먼저 참가자 이름을 선택하세요'); document.getElementById('who-sel').focus(); return; }
    const card = document.querySelector('.opt[data-q="'+id+'"]').closest('.qcard');
    card.querySelectorAll('.opt').forEach(b=>b.classList.add('locked'));
    try{
      const r = await api({action:'quizSubmit', name:myName, id:id, answer:val});
      if(!r.ok){ toast('제출 실패'); card.querySelectorAll('.opt').forEach(b=>b.classList.remove('locked')); return; }
      const q = todayQuestions.find(x=>x.id===id);
      lockCard(q, val, r.correct, r.correctAnswer, r.explain, false, r.source, r.already);
      if(r.already) toast('이미 푼 문제예요');
      refreshMine(); loadBoard();
    }catch(e){
      toast('네트워크 오류'); card.querySelectorAll('.opt').forEach(b=>b.classList.remove('locked'));
    }
  }

  function lockCard(q, myVal, correct, correctAnswer, explain, fromMine, source, already){
    const card = document.querySelector('.opt[data-q="'+q.id+'"]');
    if(!card) return;
    const wrap = card.closest('.qcard');
    wrap.querySelectorAll('.opt').forEach(b=>{
      b.classList.add('locked');
      const v = b.getAttribute('data-val');
      if(v === String(myVal)) b.classList.add(correct ? 'correct' : 'wrong');
      else if(correctAnswer!=null && v === String(correctAnswer)) b.classList.add('correct');
      else b.classList.add('dim');
    });
    const res = document.getElementById('res-'+q.id);
    if(res && (explain!=null || !fromMine)){
      res.className = 'qc-result show ' + (correct?'ok':'no');
      res.innerHTML =
        '<div class="qc-verdict '+(correct?'ok':'no')+'">'+(correct?'✓ 정답':'✗ 오답')+'</div>'+
        (explain ? '<div class="qc-explain">'+explain+'</div>' : '')+
        (source ? '<div class="qc-src">'+source+'</div>' : '');
    } else if(res){
      res.className = 'qc-result show ' + (correct?'ok':'no');
      res.innerHTML = '<div class="qc-verdict '+(correct?'ok':'no')+'">'+(correct?'✓ 정답 처리됨':'✗ 오답 처리됨')+'</div>';
    }
  }

  // ── 내 점수 ──
  async function refreshMine(){
    if(!myName){
      ['ms-total','ms-correct','ms-prov'].forEach(id=>document.getElementById(id).textContent='–');
      return;
    }
    try{
      const r = await api({action:'quizMine', name:myName});
      document.getElementById('ms-total').textContent   = r.total;
      document.getElementById('ms-correct').textContent = r.todayCorrect;
      document.getElementById('ms-prov').textContent    = '+'+r.todayProv;
      renderQuestions(r.today || {});
    }catch(e){ console.error('mine fail', e); }
  }

  // ── 주차별 리더보드 (최신 주차가 맨 위, 지난 주차 아래로 적층) ──
  function weekRange(wk){
    const s = SEASON_START.split('-').map(Number);
    const base = Date.UTC(s[0], s[1]-1, s[2]);
    const mon = new Date(base + (wk-1)*7*86400000);         // 월
    const fri = new Date(base + ((wk-1)*7+4)*86400000);     // 금
    const f = d => String(d.getUTCMonth()+1).padStart(2,'0')+'.'+String(d.getUTCDate()).padStart(2,'0');
    return f(mon)+'–'+f(fri);
  }

  function renderWeekBlock(wkData, isCurrent){
    const block = document.createElement('div');
    block.className = 'week-block';

    const tt = wkData.teamTotals || {protoss:0, zerg:0, terran:0};
    const teams = ['protoss','zerg','terran'];
    const maxT = Math.max(tt.protoss||0, tt.zerg||0, tt.terran||0);
    const tsCards = teams.map(t=>{
      const lead = maxT>0 && (tt[t]||0)===maxT;
      return '<div class="ts-card'+(lead?' lead':'')+'" data-team="'+t+'">'+
               '<div class="ts-name">'+t.toUpperCase()+'</div>'+
               '<div class="ts-pts">'+(tt[t]||0)+'</div></div>';
    }).join('');

    const board = wkData.board || [];
    let rows;
    if(!board.length){
      rows = '<div class="empty">'+(isCurrent?'아직 응답이 없습니다.':'기록 없음')+'</div>';
    } else {
      rows = board.map((row,i)=>
        '<div class="lb-row'+(row.name===myName?' me-row':'')+'">'+
          '<div class="lb-rank'+(i<3?' top':'')+'">'+(i+1)+'</div>'+
          '<div class="lb-name">'+row.name+(row.name===myName?'<span class="me">ME</span>':'')+'</div>'+
          '<div class="lb-correct">'+row.total+'</div>'+
          '<div class="lb-rate">'+(row.today>0?'+'+row.today:'–')+'</div>'+
        '</div>').join('');
    }

    block.innerHTML =
      '<div class="sec-lbl week-hdr">'+
        '<span>⬡ WEEK '+wkData.week+'<span class="wk-range">'+weekRange(wkData.week)+'</span></span>'+
        '<span class="cnt wk-badge '+(isCurrent?'live':'done')+'">'+(isCurrent?'진행중':'확정')+'</span>'+
      '</div>'+
      '<div class="team-score">'+tsCards+'</div>'+
      '<div class="sc-panel" style="padding:0;">'+
        '<div class="c-tr"></div><div class="c-bl"></div>'+
        '<div class="lb-row head"><div>#</div><div>참가자</div><div style="text-align:right">총점</div><div style="text-align:right">오늘</div></div>'+
        rows+
      '</div>';
    return block;
  }

  async function loadBoard(){
    const wrap = document.getElementById('weeks-wrap');
    try{
      const r = await api({action:'quizBoardWk'});
      const weeks = r.weeks || [];
      const cur = r.currentWeek;
      if(!weeks.length){ wrap.innerHTML = '<div class="empty">아직 시즌이 시작되지 않았습니다.</div>'; return; }
      wrap.innerHTML = '';
      weeks.forEach(wk=>{ wrap.appendChild(renderWeekBlock(wk, wk.week===cur)); });
    }catch(e){ wrap.innerHTML = '<div class="empty">리더보드를 불러오지 못했습니다.</div>'; }
  }

  // ── init ──
  (async function(){
    await loadNames();
    await loadToday();
    loadBoard();
    if(myName) refreshMine();
  })();
</script>
