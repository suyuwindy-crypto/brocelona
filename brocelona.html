<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Brocelona War of Lights</title>
<style>
:root{
  --blue:#007AFF;--green:#34C759;--red:#FF3B30;
  --bg:#F2F2F7;--card:#fff;
  --l1:#000;--l2:#3C3C43;--l3:#8E8E93;
  --sep:rgba(60,60,67,.12);--sh:0 2px 10px rgba(0,0,0,.07);
  --y:#FF9500;--b:#007AFF;--r:#FF3B30;
  --y-lt:#FFF3E0;--b-lt:#E8F0FF;--r-lt:#FFF0EF;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
  background:var(--bg);color:var(--l1);-webkit-font-smoothing:antialiased}

/* NAV */
.nav{position:sticky;top:0;z-index:100;
  background:rgba(242,242,247,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:.5px solid var(--sep);
  display:flex;align-items:center;padding:12px 16px 10px;gap:8px}
.nav-lock{width:36px;height:36px;border:none;background:rgba(118,118,128,.12);
  border-radius:10px;font-size:18px;cursor:pointer;flex-shrink:0}
.nav-center{flex:1;text-align:center}
.nav-logo{font-size:11px;font-weight:700;color:var(--blue);letter-spacing:.8px}
.nav-title{font-size:17px;font-weight:800;letter-spacing:-.5px}
.nav-right{width:36px}
.admin-bar{background:#1C1C1E;color:#fff;text-align:center;
  font-size:12px;font-weight:600;padding:5px;letter-spacing:.3px}

/* TABS */
.tabs{display:flex;margin:12px 14px 12px;
  background:rgba(118,118,128,.12);border-radius:10px;padding:2px}
.tab-btn{flex:1;padding:7px 2px;border:none;background:transparent;
  font-size:12px;font-weight:600;color:var(--l3);border-radius:8px;
  cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap}
.tab-btn.active{background:var(--card);color:var(--l1);box-shadow:0 1px 4px rgba(0,0,0,.12)}
.page{display:none}.page.active{display:block}

/* HERO */
.hero{padding:18px 18px 10px;text-align:center}
.badge{display:inline-flex;align-items:center;background:var(--b-lt);color:var(--blue);
  font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;margin-bottom:10px}
.hero h1{font-size:26px;font-weight:800;letter-spacing:-.8px;line-height:1.15}
.hero p{font-size:13px;color:var(--l3);margin-top:5px}
.rewards{display:flex;gap:8px;padding:10px 14px 14px}
.rp{flex:1;background:var(--card);border-radius:14px;padding:10px 4px;
  text-align:center;box-shadow:var(--sh)}
.rp .i{font-size:18px;margin-bottom:3px}
.rp .v{font-size:16px;font-weight:800;color:var(--blue)}
.rp .l{font-size:10px;color:var(--l3);margin-top:2px;font-weight:600}

/* SECTION */
.s{padding:0 14px 18px}
.st{font-size:18px;font-weight:700;letter-spacing:-.4px;margin-bottom:10px}

/* CARD */
.card{background:var(--card);border-radius:16px;overflow:hidden;box-shadow:var(--sh)}
.row{display:flex;align-items:center;padding:12px 14px;border-bottom:.5px solid var(--sep)}
.row:last-child{border-bottom:none}

/* LEADERBOARD */
.rank{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;
  justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.r1{background:#FFF3CD;color:#FF9500}.r2{background:#F0F0F0;color:#636366}
.r3{background:#FFF0E8;color:#A2845E}.rn{background:var(--bg);color:var(--l3);font-size:12px}
.pinfo{flex:1;margin:0 10px;min-width:0}
.pname{font-size:15px;font-weight:600}
.pills{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.pill{font-size:10px;font-weight:500;padding:2px 6px;border-radius:5px;background:var(--bg);color:var(--l2)}
.min-val{font-size:18px;font-weight:800;color:var(--blue);text-align:right}
.min-lbl{font-size:10px;color:var(--l3);text-align:right}

/* PODIUM */
.podium{display:flex;align-items:flex-end;justify-content:center;gap:8px;padding:0 14px 16px}
.pi{flex:1;text-align:center;max-width:108px}
.pc{font-size:16px;margin-bottom:2px}
.pa{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:20px;font-weight:800;margin:0 auto 5px}
.pa.p1{width:58px;height:58px;font-size:22px;background:#FFF3CD;color:#FF9500;box-shadow:0 0 0 3px #FF9500}
.pa.p2{background:#F0F0F0;color:#636366;box-shadow:0 0 0 2px #C7C7CC}
.pa.p3{background:#FFF0E8;color:#A2845E;box-shadow:0 0 0 2px #A2845E}
.pn{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pm{font-size:13px;font-weight:800;color:var(--blue);margin-top:1px}
.pb{border-radius:7px 7px 0 0;margin-top:6px}
.pb.p1{height:46px;background:linear-gradient(to top,#FF9500,#FFB340)}
.pb.p2{height:32px;background:linear-gradient(to top,#C7C7CC,#E5E5EA)}
.pb.p3{height:22px;background:linear-gradient(to top,#A2845E,#C9A07A)}

/* STATS */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:18px}
.sc{background:var(--card);border-radius:14px;padding:14px;box-shadow:var(--sh)}
.sc .i{font-size:22px;margin-bottom:6px}
.sc .v{font-size:22px;font-weight:800;letter-spacing:-.5px}
.sc .l{font-size:11px;color:var(--l3);margin-top:3px}

/* WEEK READONLY */
.wcard{background:var(--card);border-radius:14px;margin-bottom:10px;
  overflow:hidden;box-shadow:var(--sh)}
.whdr{display:flex;align-items:center;justify-content:space-between;
  padding:11px 14px;border-bottom:.5px solid var(--sep)}
.wnum{font-size:15px;font-weight:700}
.wtag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:7px}
.ty{background:var(--y-lt);color:#B36000}.tb{background:var(--b-lt);color:#004EAA}
.tr{background:var(--r-lt);color:#B30000}.tn{background:var(--bg);color:var(--l3)}
.wtbl{width:100%;border-collapse:collapse;font-size:13px}
.wtbl th{font-size:10px;color:var(--l3);font-weight:700;padding:7px 10px;
  text-align:center;border-bottom:.5px solid var(--sep)}
.wtbl td{padding:9px 10px;text-align:center;border-bottom:.5px solid var(--sep)}
.wtbl tr:last-child td{border-bottom:none}
.wtbl .tc{text-align:left;padding-left:14px;font-weight:600}
.wtbl .ms{font-size:11px;color:var(--l3);text-align:left;padding-left:10px}
.wfooter{padding:9px 14px;font-size:12px;color:var(--l3);border-top:.5px solid var(--sep)}

/* WEEK NAV (admin) */
.wnav{display:flex;align-items:center;gap:8px;padding:0 14px 12px}
.wnb{width:34px;height:34px;border:none;border-radius:9px;background:var(--card);
  color:var(--blue);font-size:18px;font-weight:700;cursor:pointer;box-shadow:var(--sh);flex-shrink:0}
.wnb:disabled{opacity:.3;cursor:default}
.wnlbl{flex:1;text-align:center;font-size:16px;font-weight:700}

/* TEAM ASSIGN */
.tacard{background:var(--card);border-radius:14px;margin:0 14px 10px;
  padding:12px 12px 8px;box-shadow:var(--sh)}
.tar{display:flex;align-items:flex-start;gap:8px;margin-bottom:9px}
.tar:last-child{margin-bottom:0}
.tabadge{width:48px;flex-shrink:0;text-align:center;padding:4px;border-radius:8px;
  font-size:10px;font-weight:700;margin-top:2px}
.tchips{display:flex;flex-wrap:wrap;gap:5px;flex:1}
.chip{display:inline-flex;align-items:center;gap:3px;padding:4px 9px;
  border-radius:7px;font-size:12px;font-weight:500;cursor:pointer}
.cy{background:var(--y-lt);color:#B36000}.cb{background:var(--b-lt);color:#004EAA}
.cr{background:var(--r-lt);color:#B30000}
.chip-add{background:var(--bg);color:var(--blue);border:1.5px dashed rgba(0,122,255,.35)}
.cdel{font-size:10px;opacity:.55}

/* ROUND CARDS */
.rcard{background:var(--card);border-radius:12px;margin-bottom:8px;
  overflow:hidden;box-shadow:var(--sh)}
.rhdr{display:flex;align-items:center;padding:10px 12px;
  border-bottom:.5px solid var(--sep);gap:6px}
.rnum{font-size:11px;font-weight:700;color:var(--l3);width:28px}
.rvs{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  font-size:14px;font-weight:700}
.rscore{font-size:19px;font-weight:800;letter-spacing:1px}
.rtag{font-size:11px;font-weight:600;padding:2px 7px;border-radius:6px}
.rdel{border:none;background:none;color:var(--l3);font-size:15px;cursor:pointer;padding:3px}
.rbody{display:flex}
.rcol{flex:1;padding:9px 11px;border-right:.5px solid var(--sep)}
.rcol:last-child{border-right:none}
.rcol-title{font-size:10px;font-weight:700;color:var(--l3);margin-bottom:5px}
.scorers{font-size:12px;color:var(--l2);margin-bottom:5px;min-height:16px}
.sbtn{font-size:11px;font-weight:600;padding:5px 9px;border-radius:7px;border:none;cursor:pointer}
.sy-btn{background:var(--y-lt);color:#B36000}
.sb-btn{background:var(--b-lt);color:#004EAA}
.sr-btn{background:var(--r-lt);color:#B30000}

/* WEEK SUMMARY (admin) */
.wsum{margin:2px 14px 16px;background:var(--card);border-radius:14px;
  overflow:hidden;box-shadow:var(--sh)}
.wsum-hdr{padding:11px 14px;font-size:13px;font-weight:700;color:var(--l2);
  border-bottom:.5px solid var(--sep)}
.wsum-win{padding:11px 14px;font-size:14px;font-weight:700;border-top:.5px solid var(--sep);
  display:flex;align-items:center;gap:6px}

/* ROSTER */
.rinput-row{display:flex;gap:8px;padding:0 14px 12px}
.rinput{flex:1;border:1.5px solid var(--sep);border-radius:11px;padding:10px 13px;
  font-size:15px;font-family:inherit;background:var(--card);outline:none;color:var(--l1)}
.rinput:focus{border-color:var(--blue)}
.rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(125px,1fr));gap:7px;
  padding:0 14px 20px}
.ritem{background:var(--card);border-radius:11px;padding:11px 12px;
  display:flex;align-items:center;justify-content:space-between;box-shadow:var(--sh)}
.rname{font-size:13px;font-weight:500}
.rdel-btn{border:none;background:none;color:var(--l3);font-size:17px;cursor:pointer;padding:0}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;
  border:none;border-radius:10px;padding:9px 14px;font-size:13px;font-weight:600;
  cursor:pointer;font-family:inherit;white-space:nowrap}
.btn:active{opacity:.7}
.btn-blue{background:var(--blue);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-ghost{background:var(--bg);color:var(--blue)}
.btn-red-ghost{background:var(--bg);color:var(--red)}
.btn-full{width:100%}
.btn-row{display:flex;gap:7px;flex-wrap:wrap;padding:0 14px 10px}

/* OVERLAY + SHEET */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300}
.sheet{position:fixed;bottom:0;left:0;right:0;background:var(--card);
  border-radius:20px 20px 0 0;z-index:301;max-height:72vh;overflow-y:auto;
  padding-bottom:env(safe-area-inset-bottom,12px);
  transform:translateY(100%);transition:transform .28s cubic-bezier(.32,0,.67,0)}
.sheet.open{transform:translateY(0)}
.handle{width:34px;height:4px;background:rgba(60,60,67,.18);border-radius:2px;margin:10px auto 2px}
.sheet-title{font-size:16px;font-weight:700;text-align:center;padding:8px 18px 12px}
.sheet-sub{font-size:11px;font-weight:700;color:var(--l3);padding:2px 18px 8px;letter-spacing:.4px}
.srow{display:flex;align-items:center;padding:11px 18px;border-bottom:.5px solid var(--sep)}
.srow:last-of-type{border-bottom:none}
.srow-name{flex:1;font-size:14px;font-weight:500}
.gcounter{display:flex;align-items:center;gap:11px}
.gbtn{width:30px;height:30px;border-radius:50%;border:none;font-size:18px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center}
.gbtn.minus{background:#F0F0F0;color:var(--l2)}.gbtn.plus{background:var(--blue);color:#fff}
.gcount{font-size:17px;font-weight:800;min-width:22px;text-align:center}
.sheet-foot{padding:12px 16px 4px}

/* ASSIGN SHEET */
.agrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:8px 16px 14px}
.aitem{padding:11px;border-radius:11px;background:var(--bg);text-align:center;
  font-size:13px;font-weight:500;cursor:pointer;border:2px solid transparent}
.aitem:active{opacity:.7}
.aitem.ay{background:var(--y-lt);color:#B36000;border-color:var(--y)}
.aitem.ab{background:var(--b-lt);color:#004EAA;border-color:var(--b)}
.aitem.ar{background:var(--r-lt);color:#B30000;border-color:var(--r)}

/* ROUND PICK */
.rpick-row{display:flex;gap:8px;padding:8px 16px 14px}
.rpick{flex:1;padding:12px 4px;border-radius:11px;border:2px solid transparent;
  font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;
  background:var(--bg);color:var(--l3)}
.rpick.py{background:var(--y-lt);color:#B36000;border-color:var(--y)}
.rpick.pb{background:var(--b-lt);color:#004EAA;border-color:var(--b)}
.rpick.pr{background:var(--r-lt);color:#B30000;border-color:var(--r)}

/* PIN MODAL */
.pin-wrap{display:none;position:fixed;inset:0;z-index:400;
  background:rgba(0,0,0,.55);align-items:center;justify-content:center}
.pin-wrap.open{display:flex}
.pin-box{background:var(--card);border-radius:20px;padding:26px 22px;width:290px;max-width:88vw}
.pin-box h2{font-size:17px;font-weight:700;text-align:center;margin-bottom:5px}
.pin-box p{font-size:13px;color:var(--l3);text-align:center;margin-bottom:18px}
.pin-inp{width:100%;border:1.5px solid var(--sep);border-radius:11px;padding:12px;
  font-size:20px;text-align:center;letter-spacing:6px;font-family:inherit;
  background:var(--bg);outline:none;color:var(--l1)}
.pin-inp:focus{border-color:var(--blue)}
.pin-err{font-size:12px;color:var(--red);text-align:center;margin-top:6px;min-height:16px}
.pin-acts{display:flex;gap:8px;margin-top:14px}
.pin-logout{text-align:center;margin-top:12px;font-size:13px;color:var(--red);
  font-weight:600;cursor:pointer;display:none}

/* EXCEL ROUND TABLE */
.rtable-wrap{padding:0 14px 16px;overflow-x:auto}
.rtable{width:100%;border-collapse:separate;border-spacing:0;font-size:13px}
.rtable th{padding:8px 6px;font-size:11px;font-weight:700;color:var(--l3);
  border-bottom:2px solid var(--sep);text-align:center;white-space:nowrap}
.rtable th.th-r{width:36px;color:var(--l3)}
.rtable td{padding:0;border-bottom:.5px solid var(--sep);vertical-align:top}
.rtable tr:last-child td{border-bottom:none}
.rcell{min-height:52px;padding:6px 7px;cursor:pointer;display:flex;flex-direction:column;gap:3px;
  align-items:flex-start;transition:background .15s}
.rcell:active{opacity:.7}
.rcell-num{width:36px;min-height:52px;display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:var(--l3);background:var(--bg);cursor:default}
.rcell.cy{background:#FFFDF5}.rcell.cb{background:#F5F8FF}.rcell.cr{background:#FFF5F5}
.scorer-tag{display:inline-flex;align-items:center;gap:2px;background:rgba(0,0,0,.06);
  border-radius:5px;padding:2px 6px;font-size:11px;font-weight:500;white-space:nowrap}
.rcell-add{font-size:11px;color:var(--l3);margin-top:2px}
.rcell-empty{opacity:.45;border:1.5px dashed rgba(0,0,0,.1)}
.rcell-empty:hover,.rcell-empty:active{opacity:.8}
.rcell-standby{background:var(--bg);cursor:default;align-items:center;justify-content:center}
.rcell-standby-txt{font-size:11px;font-weight:600;color:var(--l3);letter-spacing:.3px}
.rcell-zero{font-size:15px;font-weight:700;color:var(--l3)}
.rtable-add-row{display:flex;justify-content:flex-end;padding:6px 14px 0}
.score-badge{display:inline-block;min-width:22px;text-align:center;
  background:rgba(0,0,0,.08);border-radius:5px;padding:1px 5px;
  font-size:12px;font-weight:800;margin-left:2px}

/* EMPTY / TOAST */
.empty{text-align:center;padding:30px 16px;color:var(--l3);font-size:13px}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(12px);
  background:#1C1C1E;color:#fff;padding:9px 18px;border-radius:11px;
  font-size:13px;font-weight:500;opacity:0;transition:all .25s;z-index:500;white-space:nowrap}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>


<!-- NAV -->
<div class="nav">
  <button class="nav-lock" id="lock-btn" onclick="openPin()">🔒</button>
  <div class="nav-center">
    <div class="nav-logo">⚽ BROCELONA</div>
    <div class="nav-title">War of Lights</div>
  </div>
  <div class="nav-right"></div>
</div>

<!-- TABS -->
<div class="tabs" id="tabs">
  <button class="tab-btn active" id="t-lb"     onclick="go('lb',this)">리더보드</button>
  <button class="tab-btn"        id="t-weekly"  onclick="go('weekly',this)">주차별</button>
  <button class="tab-btn"        id="t-stats"   onclick="go('stats',this)">기록</button>
</div>

<!-- PAGE: 리더보드 -->
<div class="page active" id="page-lb">
  <div class="hero">
    <div class="badge">⬡ 미네랄 리그</div>
    <h1>풋살 미네랄<br>리더보드</h1>
    <p>출석 · 득점 · 승리로 미네랄을 획득하세요</p>
  </div>
  <div class="rewards">
    <div class="rp"><div class="i">📅</div><div class="v">+100</div><div class="l">출석</div></div>
    <div class="rp"><div class="i">⚽</div><div class="v">+50</div><div class="l">1골당</div></div>
    <div class="rp"><div class="i">🏆</div><div class="v">+200</div><div class="l">승리팀</div></div>
  </div>
  <div id="podium"></div>
  <div class="s">
    <div class="st">전체 순위</div>
    <div id="lb-list"><div class="card"><div class="empty">데이터를 입력하면 순위가 표시됩니다</div></div></div>
  </div>
</div>

<!-- PAGE: 주차별 (공개 읽기 전용) -->
<div class="page" id="page-weekly">
  <div class="s">
    <div class="st">주차별 경기 결과</div>
    <div id="weekly-list"></div>
  </div>
</div>

<!-- PAGE: 기록 -->
<div class="page" id="page-stats">
  <div class="s">
    <div class="st">전체 통계</div>
    <div class="sg" id="sg"></div>
    <div class="st">⚽ 득점 TOP</div>
    <div class="card" id="scorer-list" style="margin-bottom:18px"></div>
    <div class="st">📅 출석 TOP</div>
    <div class="card" id="attend-list"></div>
  </div>
</div>






<!-- PIN MODAL -->
<div class="pin-wrap" id="pin-wrap" onclick="if(event.target===this)closePin()">
  <div class="pin-box">
    <h2 id="pin-title">🔒 관리자 로그인</h2>
    <p id="pin-sub">PIN 번호를 입력하세요</p>
    <input class="pin-inp" id="pin-inp" type="password" inputmode="numeric"
      maxlength="6" placeholder="• • • •" onkeydown="if(event.key==='Enter')checkPin()">
    <div class="pin-err" id="pin-err"></div>
    <div class="pin-acts">
      <button class="btn btn-ghost btn-full" onclick="closePin()">취소</button>
      <button class="btn btn-blue btn-full" onclick="checkPin()">확인</button>
    </div>
    <div id="pin-reset-row" style="text-align:center;margin-top:10px;display:none">
      <span style="font-size:12px;color:var(--l3)">PIN을 잊으셨나요?</span>
      <span onclick="resetPin()" style="font-size:12px;color:var(--blue);font-weight:600;cursor:pointer;margin-left:5px">1234로 초기화</span>
    </div>
    <div class="pin-logout" id="pin-logout" onclick="logout()">관리자 모드 종료</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ───────────────── GOOGLE SHEETS CONFIG ───────────────── */
const SHEET_ID = '1VE6OnU6IirhnR9bJX9UPpuPtVI_WJOFDH5nmFTSINjs';
const API_KEY  = 'AIzaSyDZ1wkWyjUb6wCe2RfT_TJxhaZIh8mVoNc';
const BASE = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values`;

async function fetchSheet(range){
  const res = await fetch(`${BASE}/${encodeURIComponent(range)}?key=${API_KEY}`);
  const j = await res.json();
  return j.values || [];
}

/* ───────────────── CONSTANTS ───────────────── */
const C  = ['옐로','블루','레드'];
const CE = {옐로:'🟡',블루:'🔵',레드:'🔴'};
const CC = {옐로:'y',블루:'b',레드:'r'};
const WINTAG = {옐로:'ty wtag',블루:'tb wtag',레드:'tr wtag'};
const MO=100, MG=50, MW=200;

/* ───────────────── STATE ───────────────── */
let roster=[], weeks=[], captains=new Set();

/* ───────────────── LOAD FROM SHEETS ───────────────── */
async function load(){
  try{
    /* 팀배정: A=주차, B=옐로선수, C=블루선수, D=레드선수 (행마다 선수 1명씩) */
    const tRows = await fetchSheet('팀배정!A2:D');

    /* 경기결과: A=주차, B=라운드, C=옐로득점자, D=블루득점자, E=레드득점자 */
    const gRows = await fetchSheet('경기결과!A2:E');

    const weekMap = {};
    captains = new Set();

    /* 팀배정 파싱 - 행마다 선수 1명, 같은 주차 여러 행 */
    tRows.forEach(r=>{
      const wk=parseInt(r[0]); if(!wk) return;
      if(!weekMap[wk]) weekMap[wk]={week:wk,teams:{옐로:[],블루:[],레드:[]},rounds:[],captains:{}};
      ['옐로','블루','레드'].forEach((c,ci)=>{
        const name=(r[ci+1]||'').trim();
        if(!name) return;
        weekMap[wk].teams[c].push(name);
        /* 각 팀 첫 번째로 추가된 선수 = 캡틴 */
        if(!weekMap[wk].captains[c]){
          weekMap[wk].captains[c]=name;
          captains.add(name);
        }
      });
    });

    /* 경기결과 파싱 */
    const rdMap={};
    const parseScorers=s=>{
      const scores={};
      (s||'').split(' ').map(n=>n.trim()).filter(Boolean).forEach(n=>{
        scores[n]=(scores[n]||0)+1;
      });
      return scores;
    };

    gRows.forEach(r=>{
      const wk=parseInt(r[0]),ri=parseInt(r[1]); if(!wk||!ri) return;
      if(!weekMap[wk]) weekMap[wk]={week:wk,teams:{옐로:[],블루:[],레드:[]},rounds:[],captains:{}};
      if(!rdMap[wk]) rdMap[wk]={};

      const participating=[];
      ['옐로','블루','레드'].forEach((c,idx)=>{
        const raw=(r[2+idx]||'').trim();
        if(raw==='') return;
        if(raw==='0'){participating.push({c,s:{}});return;}
        participating.push({c,s:parseScorers(raw)});
      });

      if(participating.length>=2){
        rdMap[wk][ri]={
          tA:participating[0].c, tB:participating[1].c,
          sA:participating[0].s, sB:participating[1].s
        };
      }
    });

    /* rounds 배열 변환 */
    Object.keys(rdMap).forEach(wk=>{
      if(!weekMap[wk]) return;
      const maxRi=Math.max(...Object.keys(rdMap[wk]).map(Number));
      weekMap[wk].rounds=[];
      for(let i=1;i<=maxRi;i++){
        weekMap[wk].rounds.push(rdMap[wk][i]||{tA:null,tB:null,sA:{},sB:{}});
      }
    });

    weeks=Object.values(weekMap).sort((a,b)=>a.week-b.week);

    /* 선수명단: 팀배정에 등장한 모든 이름 자동 추출 */
    const nameSet=new Set();
    weeks.forEach(wk=>C.forEach(c=>(wk.teams[c]||[]).forEach(n=>nameSet.add(n))));
    roster=[...nameSet].sort((a,b)=>a.localeCompare(b,'ko'));

  } catch(e){
    console.error('load error',e);
    roster=[];weeks=[];
  }
}

/* ───────────────── CALC ───────────────── */
function calc(){
  const P={};
  const ens=n=>{if(!P[n])P[n]={name:n,att:0,goals:0,wins:0,cap:0,min:0};return P[n];};
  roster.forEach(n=>ens(n));
  const ww={};
  weeks.forEach((wk,i)=>{
    /* 출석: 팀에 배정된 모든 선수 */
    C.forEach(c=>(wk.teams[c]||[]).forEach(n=>ens(n).att++));
    /* 캡틴 카운트: 이번 주 캡틴이면 cap++ */
    C.forEach(c=>{
      const cap=(wk.captains||{})[c];
      if(cap) ens(cap).cap++;
    });
    const rw={옐로:0,블루:0,레드:0};
    (wk.rounds||[]).filter(rd=>rd.tA&&rd.tB).forEach(rd=>{
      let gA=0,gB=0;
      Object.entries(rd.sA||{}).forEach(([n,g])=>{ens(n).goals+=g;gA+=g;});
      Object.entries(rd.sB||{}).forEach(([n,g])=>{ens(n).goals+=g;gB+=g;});
      if(gA>gB) rw[rd.tA]++;
      else if(gB>gA) rw[rd.tB]++;
    });
    let mx=0,win=null,tie=false;
    Object.entries(rw).forEach(([c,w])=>{
      if(w>mx){mx=w;win=c;tie=false;}
      else if(w===mx&&w>0) tie=true;
    });
    if(!tie&&win&&mx>0){
      ww[i]=win;
      (wk.teams[win]||[]).forEach(n=>ens(n).wins++);
    }
  });
  /* 미네랄: 출석100 + 득점50 + 승리200 + 캡틴50 */
  Object.values(P).forEach(p=>p.min=p.att*MO+p.goals*MG+p.wins*MW+p.cap*50);
  return {P,ww};
}

/* ───────────────── LEADERBOARD ───────────────── */
function renderLB(){
  const {P}=calc();
  const sorted=Object.values(P).sort((a,b)=>b.min-a.min);
  const pw=document.getElementById('podium');
  if(!sorted.length){
    pw.innerHTML='';
    document.getElementById('lb-list').innerHTML='<div class="card"><div class="empty">데이터를 입력하면 순위가 표시됩니다</div></div>';
    return;
  }
  const disp=[sorted[1]||null,sorted[0]||null,sorted[2]||null];
  const cl=['p2','p1','p3'],cr=['👑','🥈','🥉'];
  let ph='<div class="podium">';
  disp.forEach((p,i)=>{
    if(!p){ph+='<div class="pi"></div>';return;}
    const rk=sorted.indexOf(p)+1;
    ph+=`<div class="pi"><div class="pc">${cr[rk-1]}</div>
      <div class="pa ${cl[i]}">${p.name.charAt(0)}</div>
      <div class="pn">${p.name}</div><div class="pm">${p.min.toLocaleString()}</div>
      <div class="pb ${cl[i]}"></div></div>`;
  });
  pw.innerHTML=ph+'</div>';
  let lh='<div class="card">';
  sorted.forEach((p,i)=>{
    const rk=i+1,rc=rk<=3?`r${rk}`:'rn';
    const isCap=captains.has(p.name);
    lh+=`<div class="row">
      <div class="rank ${rc}">${rk}</div>
      <div class="pinfo">
        <div class="pname">${p.name}${isCap?' <span style="font-size:10px;background:#FFF3CD;color:#B36000;border-radius:4px;padding:1px 5px;font-weight:700">C</span>':''}</div>
        <div class="pills">
          <span class="pill">📅 ${p.att}회</span>
          <span class="pill">⚽ ${p.goals}골</span>
          <span class="pill">🏆 ${p.wins}승</span>
          ${isCap?`<span class="pill" style="background:#FFF3CD;color:#B36000">👑 +${p.cap*50}</span>`:''}
        </div>
      </div>
      <div><div class="min-val">${p.min.toLocaleString()}</div><div class="min-lbl">⬡ 미네랄</div></div>
    </div>`;
  });
  document.getElementById('lb-list').innerHTML=lh+'</div>';
}

/* ───────────────── WEEKLY ───────────────── */
function renderWeekly(){
  const {ww}=calc();
  const el=document.getElementById('weekly-list');
  if(!weeks.length){el.innerHTML='<div class="card"><div class="empty">경기 기록이 없습니다</div></div>';return;}
  let html='';
  const RANK_ICON=['🥇','🥈','🥉'];
  weeks.forEach((wk,i)=>{
    const rds=(wk.rounds||[]).filter(rd=>rd.tA&&rd.tB);
    const tot={옐로:{g:0,w:0,l:0,d:0,pts:0},블루:{g:0,w:0,l:0,d:0,pts:0},레드:{g:0,w:0,l:0,d:0,pts:0}};
    rds.forEach(rd=>{
      const gA=Object.values(rd.sA||{}).reduce((s,v)=>s+v,0);
      const gB=Object.values(rd.sB||{}).reduce((s,v)=>s+v,0);
      tot[rd.tA].g+=gA;tot[rd.tB].g+=gB;
      if(gA>gB){tot[rd.tA].w++;tot[rd.tB].l++;}
      else if(gB>gA){tot[rd.tB].w++;tot[rd.tA].l++;}
      else{tot[rd.tA].d++;tot[rd.tB].d++;}
    });
    /* 승점 계산 */
    C.forEach(c=>{tot[c].pts=tot[c].w*3+tot[c].d*1;});
    const active=C.filter(c=>(wk.teams[c]||[]).length>0||rds.some(rd=>rd.tA===c||rd.tB===c));
    /* 승점 내림차순 정렬 */
    const ranked=[...active].sort((a,b)=>tot[b].pts-tot[a].pts||tot[b].g-tot[a].g);
    const win=ww[i];
    const winLabel=ranked.length?`${CE[ranked[0]]} ${ranked[0]}팀 1위`:'기록 없음';
    const winCls=ranked.length?WINTAG[ranked[0]]:'tn wtag';
    html+=`<div class="wcard">
      <div class="whdr">
        <div class="wnum">${wk.week}주차</div>
        <div class="${winCls}">${winLabel}</div>
      </div>`;

    /* 상단: 팀 순위표 */
    if(active.length){
      html+=`<table class="wtbl"><thead><tr>
        <th style="width:18px"></th>
        <th style="text-align:left;padding-left:6px">팀</th>
        <th style="text-align:left;padding-left:6px;font-size:10px">주장</th>
        <th>승점</th><th>득점</th><th>승</th><th>패</th><th>무</th>
      </tr></thead><tbody>`;
      ranked.forEach((c,ri)=>{
        const t=tot[c];
        const captain=(wk.teams[c]||[])[0]||'-';
        const isTop=ri===0;
        html+=`<tr${isTop?' style="font-weight:700"':''}>
          <td style="text-align:center;font-size:13px">${RANK_ICON[ri]||''}</td>
          <td class="tc" style="padding-left:6px">${CE[c]} ${c}</td>
          <td class="ms" style="padding-left:6px">${captain}</td>
          <td style="font-weight:700;color:var(--blue)">${t.pts}</td>
          <td>${t.g}</td><td>${t.w}</td><td>${t.l}</td><td>${t.d}</td>
        </tr>`;
      });
      html+='</tbody></table>';
    }

    /* 하단: 라운드별 3열 표 */
    if(rds.length){
      html+=`<div style="overflow-x:auto;padding:8px 10px 10px">
        <table style="width:100%;border-collapse:separate;border-spacing:0;font-size:11px">
          <thead><tr>
            <th style="width:30px;color:var(--l3);font-weight:700;padding:5px 4px;border-bottom:1.5px solid var(--sep)">R</th>
            <th style="color:var(--y);font-weight:700;padding:5px 6px;border-bottom:1.5px solid var(--sep);text-align:left">🟡 옐로</th>
            <th style="color:var(--b);font-weight:700;padding:5px 6px;border-bottom:1.5px solid var(--sep);text-align:left">🔵 블루</th>
            <th style="color:var(--r);font-weight:700;padding:5px 6px;border-bottom:1.5px solid var(--sep);text-align:left">🔴 레드</th>
            <th style="color:var(--y);font-weight:800;padding:5px 4px;border-bottom:1.5px solid var(--sep);text-align:center;border-left:1.5px solid var(--sep)">🟡</th>
            <th style="color:var(--b);font-weight:800;padding:5px 4px;border-bottom:1.5px solid var(--sep);text-align:center">🔵</th>
            <th style="color:var(--r);font-weight:800;padding:5px 4px;border-bottom:1.5px solid var(--sep);text-align:center">🔴</th>
          </tr></thead><tbody>`;
      rds.forEach((rd,ri)=>{
        const gA=Object.values(rd.sA||{}).reduce((s,v)=>s+v,0);
        const gB=Object.values(rd.sB||{}).reduce((s,v)=>s+v,0);
        /* 각 팀별 득점자 문자열 */
        const cellOf=(c)=>{
          if(rd.tA===c){
            const sc=Object.entries(rd.sA||{}).map(([n,g])=>g>1?`${n}×${g}`:n).join(' ')||'0';
            return `<span style="color:var(--${CC[c]})">${gA}</span> <span style="color:var(--l2)">${sc}</span>`;
          } else if(rd.tB===c){
            const sc=Object.entries(rd.sB||{}).map(([n,g])=>g>1?`${n}×${g}`:n).join(' ')||'0';
            return `<span style="color:var(--${CC[c]})">${gB}</span> <span style="color:var(--l2)">${sc}</span>`;
          } else {
            return `<span style="color:var(--l3)">대기</span>`;
          }
        };
        const border=ri<rds.length-1?'border-bottom:.5px solid var(--sep)':'';
        /* 라운드 결과: 승=W 무=D 패=L */
        const rdResult=(c)=>{
          const isA=rd.tA===c,isB=rd.tB===c;
          if(!isA&&!isB) return '<span style="color:var(--l3)">-</span>';
          const my=isA?gA:gB, opp=isA?gB:gA;
          if(my>opp) return '<span style="font-weight:800;color:var(--green)">W</span>';
          if(my<opp) return '<span style="color:var(--l3)">L</span>';
          return '<span style="color:var(--y)">D</span>';
        };
        html+=`<tr>
          <td style="color:var(--l3);font-weight:700;padding:6px 4px;${border}">R${ri+1}</td>
          <td style="padding:6px 6px;${border};background:${rd.tA==='옐로'||rd.tB==='옐로'?'#FFFDF5':'var(--bg)'}">${cellOf('옐로')}</td>
          <td style="padding:6px 6px;${border};background:${rd.tA==='블루'||rd.tB==='블루'?'#F5F8FF':'var(--bg)'}">${cellOf('블루')}</td>
          <td style="padding:6px 6px;${border};background:${rd.tA==='레드'||rd.tB==='레드'?'#FFF5F5':'var(--bg)'}">${cellOf('레드')}</td>
          <td style="text-align:center;padding:6px 4px;${border};border-left:1.5px solid var(--sep)">${rdResult('옐로')}</td>
          <td style="text-align:center;padding:6px 4px;${border}">${rdResult('블루')}</td>
          <td style="text-align:center;padding:6px 4px;${border}">${rdResult('레드')}</td>
        </tr>`;
      });
      html+='</tbody></table></div>';
    }
    html+='</div>';
  });
  el.innerHTML=html;
}

/* ───────────────── STATS ───────────────── */
function renderStats(){
  const {P,ww}=calc();
  const all=Object.values(P);
  const totalM=all.reduce((s,p)=>s+p.min,0);
  const totalG=all.reduce((s,p)=>s+p.goals,0);
  document.getElementById('sg').innerHTML=`
    <div class="sc"><div class="i">👥</div><div class="v">${all.length}</div><div class="l">총 선수</div></div>
    <div class="sc"><div class="i">⚽</div><div class="v">${totalG}</div><div class="l">총 득점</div></div>
    <div class="sc"><div class="i">⬡</div><div class="v" style="color:var(--blue);font-size:19px">${totalM.toLocaleString()}</div><div class="l">총 미네랄</div></div>
    <div class="sc"><div class="i">📅</div><div class="v">${Object.keys(ww).length}</div><div class="l">진행 주차</div></div>`;
  const sc=all.filter(p=>p.goals>0).sort((a,b)=>b.goals-a.goals).slice(0,10);
  document.getElementById('scorer-list').innerHTML=sc.length
    ?sc.map((p,i)=>`<div class="row">
        <div class="rank ${i<3?`r${i+1}`:'rn'}">${i+1}</div>
        <div class="pinfo" style="margin:0 10px"><div class="pname">${p.name}</div></div>
        <div style="font-size:19px;font-weight:800">⚽ ${p.goals}</div></div>`).join('')
    :'<div class="empty">득점 기록 없음</div>';
  const at=[...all].sort((a,b)=>b.att-a.att).slice(0,10);
  document.getElementById('attend-list').innerHTML=at.length
    ?at.map((p,i)=>`<div class="row">
        <div class="rank ${i<3?`r${i+1}`:'rn'}">${i+1}</div>
        <div class="pinfo" style="margin:0 10px"><div class="pname">${p.name}</div></div>
        <div style="font-size:19px;font-weight:800">📅 ${p.att}</div></div>`).join('')
    :'<div class="empty">출석 기록 없음</div>';
}

/* ───────────────── PIN / ADMIN ───────────────── */
let isAdmin=false;
function openPin(){
  const inp=document.getElementById('pin-inp');
  inp.value='';
  document.getElementById('pin-err').textContent='';
  document.getElementById('pin-reset-row').style.display='none';
  if(isAdmin){
    document.getElementById('pin-title').textContent='⚙️ 관리자 설정';
    document.getElementById('pin-sub').textContent='새 PIN 입력 시 변경됩니다';
    document.getElementById('pin-logout').style.display='block';
  } else {
    document.getElementById('pin-title').textContent='🔒 관리자 로그인';
    document.getElementById('pin-sub').textContent='PIN 번호를 입력하세요';
    document.getElementById('pin-logout').style.display='none';
  }
  document.getElementById('pin-wrap').classList.add('open');
  setTimeout(()=>inp.focus(),150);
}
function closePin(){document.getElementById('pin-wrap').classList.remove('open');}
function getPin(){return localStorage.getItem('bwol_pin')||'1234';}
function checkPin(){
  const v=document.getElementById('pin-inp').value.trim();
  if(!v){document.getElementById('pin-err').textContent='PIN을 입력하세요';return;}
  if(isAdmin){
    if(v.length<4){document.getElementById('pin-err').textContent='4자리 이상 입력하세요';return;}
    localStorage.setItem('bwol_pin',v);toast('PIN 변경 완료');closePin();
  } else {
    if(v===getPin()){
      isAdmin=true;applyAdmin();closePin();toast('관리자 모드 활성화');
    } else {
      document.getElementById('pin-err').textContent='❌ PIN이 틀렸습니다';
      document.getElementById('pin-reset-row').style.display='block';
      document.getElementById('pin-inp').value='';
      document.getElementById('pin-inp').focus();
    }
  }
}
function resetPin(){
  if(!confirm('PIN을 1234로 초기화할까요?'))return;
  localStorage.removeItem('bwol_pin');
  document.getElementById('pin-err').textContent='PIN이 1234로 초기화되었습니다';
  document.getElementById('pin-reset-row').style.display='none';
  document.getElementById('pin-inp').value='';
  document.getElementById('pin-inp').focus();
}
function logout(){isAdmin=false;applyAdmin();closePin();go('lb',document.getElementById('t-lb'));toast('관리자 모드 종료');}
function applyAdmin(){
  document.getElementById('admin-bar').style.display=isAdmin?'block':'none';
  document.getElementById('lock-btn').textContent=isAdmin?'🔓':'🔒';
}

/* ───────────────── TAB NAV ───────────────── */
function go(tab,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  el.classList.add('active');
  if(tab==='lb')     renderLB();
  if(tab==='weekly') renderWeekly();
  if(tab==='stats')  renderStats();
}

/* ───────────────── TOAST ───────────────── */
let tt;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('on');
  clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('on'),2000);
}

/* ───────────────── WINDOW EXPORTS ───────────────── */
/* expose all interactive functions globally */
window.go=go;
window.openPin=openPin;
window.closePin=closePin;
window.checkPin=checkPin;
window.resetPin=resetPin;
window.logout=logout;



/* ───────────────── INIT ───────────────── */
(async()=>{
  document.body.style.opacity='0.4';
  await load();
  document.body.style.opacity='1';
  applyAdmin();
  renderLB();
})();
</script>
